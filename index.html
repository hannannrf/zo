<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Zoa 💖</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fce3ec, #f9f7d9, #e0c3fc);
    font-family: 'Poppins', sans-serif;
    color: #5a3e5c;
  }

  .card {
    text-align: center;
    padding: 40px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    max-width: 500px;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3.2rem;
    color: #ff6fa1;
    margin-bottom: 15px;
  }

  p {
    font-size: 1.2rem;
    margin: 10px 0;
  }

  .love {
    font-size: 1.8rem;
    font-weight: bold;
    margin-top: 20px;
    color: #ff4d88;
  }

  .heart {
    color: #ff2e63;
    animation: beat 1s infinite;
    display: inline-block;
  }

  @keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* Floating hearts */
  .heart-float {
    position: absolute;
    bottom: -50px;
    font-size: 18px;
    color: rgba(255, 105, 180, 0.7);
    animation: floatUp 8s linear infinite;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    100% {
      transform: translateY(-110vh) scale(1.5);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d0d5b8b7b6.mp3?filename=romantic-14029.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>For My Zoa 💖</h1>

  <p>
    Zoa is the best thing that has ever happened to me.
  </p>

  <p class="love">
    I LOVE HER SO MUCH <span class="heart">❤️</span>
  </p>
</div>

<script>
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart-float");
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 10000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
